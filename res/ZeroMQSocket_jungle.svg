<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="150" height="380" viewBox="0 0 150 380">
  <!-- Solid Dark Background (prevents transparency in VCV Rack NanoSVG) -->
  <rect width="150" height="380" fill="#122b14"/>
  
  <!-- Panel Border -->
  <rect x="5" y="5" width="140" height="370" fill="none" stroke="#4a5d30" stroke-width="1.5"/>

  <!-- OLED Display Border Placeholder (sits at x=14, y=29, w=122, h=72 in VCV coords) -->
  <rect x="14" y="29" width="122" height="72" fill="none" stroke="#5a6e3b" stroke-width="1" rx="4"/>
  
  <!-- Module Name (drawn on panel, display has its own text) -->
  <text x="75" y="22" fill="#39ff14" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">ØMQ SOCKET</text>

  <!-- Controls Labels (PORT, PROTO, BP) at y=116 -->
  <text x="37.5" y="116" fill="#ffd700" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">PORT</text>
  <text x="75" y="116" fill="#ffd700" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">PROTO</text>
  <text x="112.5" y="116" fill="#ffd700" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">BP</text>

  <!-- CV Outputs 3x3 Grid Section (header at y=172) -->
  <text x="75" y="172" fill="#ffd700" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">CV OUT (1-9)</text>
  
  <!-- CV Labels (y=186, 221, 256) -->
  <text x="37.5" y="186" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">1</text>
  <text x="75" y="186" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">2</text>
  <text x="112.5" y="186" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">3</text>

  <text x="37.5" y="221" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">4</text>
  <text x="75" y="221" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">5</text>
  <text x="112.5" y="221" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">6</text>

  <text x="37.5" y="256" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">7</text>
  <text x="75" y="256" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">8</text>
  <text x="112.5" y="256" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">9</text>

  <!-- Poly MIDI Section (header at y=302) -->
  <text x="75" y="302" fill="#ffd700" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">POLY MIDI OUT</text>
  
  <!-- Poly Labels (y=344) -->
  <text x="37.5" y="344" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">PITCH</text>
  <text x="75" y="344" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">GATE</text>
  <text x="112.5" y="344" fill="#8b8e36" font-family="sans-serif" font-size="7" text-anchor="middle">VEL</text>

  <!-- Footer text (discotemple) -->
  <text x="75" y="366" fill="#39ff14" font-family="sans-serif" font-size="7" text-anchor="middle" font-weight="bold">discotemple</text>

  <!-- Screw holes placement (helper guides) -->
  <circle cx="15" cy="7.5" r="3" fill="#40513b"/>
  <circle cx="135" cy="7.5" r="3" fill="#40513b"/>
  <circle cx="15" cy="372.5" r="3" fill="#40513b"/>
  <circle cx="135" cy="372.5" r="3" fill="#40513b"/>
</svg>